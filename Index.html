<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Java UML Diagram Generator</title>
    <link rel="stylesheet" href="Styles.css">
</head>
<body>
    
    <div id="app">

        <!-- SIDEBAR -->
         <div id="sidebar">

            <div id="drop-zone" onclick="document.getElementById('file-input').click()">
                <div class="dz-icon">☕</div>
                <span>Drop .java files<br>or click to browse</span>
                <input type="file" id="file-input" multiple accept=".java"/>
            </div>

            <div id="file-list"></div>

            <div id="bottom" style="display:none">
                <div id="legend">
                    <div class="legend-row">
                        <svg width="36" height="10">
                            <defs>
                                <marker id="l1" viewbox="0 0 12 12" refX="11" refY="6"
                                        markerWidth="8" markerHeight="8" orient="auto">
                                    <path d="M1 1L11 6L1 11Z" class="legend-arrow"/>
                                </marker>
                            </defs>
                            <line x1="2" y1="5" x2="28" y2="5" class="legend-line legend-dashed" marker-end="url(#12)"/>
                        </svg>
                        implements
                    </div>
                </div>
                <button class="clear-btn" onclick="clearAll()">Clear all</button>
            </div>

         </div>

         <!-- CANVAS -->
          <div id="canvas">

            <svg id="diagram">
                <defs>
                    <marker id="m-inh" viewbox="0 0 12 12" refX="11.5" refY="6"
                            markerWidth="10" markerHeight="10" orient="auto">
                        <path d="M1 1L11 11Z" class="arrow-head"/>
                    </marker>
                </defs>
                <g id="world"></g>
            </svg>

            <div id="empty-state">
                <div class="empty-icon">☕</div>
                <div class="empty-title">Upload Java files to generate UML</div>
                <div class="empty-sub">Classes, interfaces, enums - all supported</div>
            </div>

            <div id="toolbar">
                <button class="tb-btn" onclick="fitView()">⊡ Fit</button>
                <button class="tb-btn" onclick="zoom(1.2)">+</button>
                <button class="tb-btn" onclick="zoom(0.8)">-</button>
            </div>

          </div>
    </div>

    <script src="Script.js"></script>
</body>
</html>
